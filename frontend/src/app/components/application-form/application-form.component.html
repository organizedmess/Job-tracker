<section class="page">
  <h2>Add Application</h2>

  <form [formGroup]="applicationForm" (ngSubmit)="onSubmit()" class="form-grid">
    <label>
      Company
      <input type="text" formControlName="company" />
    </label>

    <label>
      Role
      <input type="text" formControlName="role" />
    </label>

    <label>
      Status
      <select formControlName="status">
        <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
      </select>
    </label>

    <label>
      Applied Date
      <input type="date" formControlName="applied_date" />
    </label>

    <label class="full-width">
      Notes
      <textarea formControlName="notes" rows="4"></textarea>
    </label>

    <button type="submit">Save</button>
  </form>
</section>
